apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cainjekt
  namespace: kube-system
  labels:
    app: cainjekt
spec:
  selector:
    matchLabels:
      app: cainjekt
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: cainjekt
    spec:
      serviceAccountName: cainjekt
      hostPID: true
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
        effect: NoSchedule
      - operator: Exists
        effect: NoExecute
      initContainers:
      - name: install-plugin-binary
        image: cainjekt-installer:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          # Copy plugin binary to host path so OCI hooks can access it
          mkdir -p /host-bin/bin
          install -m 0755 /cainjekt /host-bin/bin/cainjekt
          ls -la /host-bin/bin/cainjekt
          echo "Plugin binary installed to /opt/cainjekt/bin/cainjekt"
        volumeMounts:
        - name: plugin-install-dir
          mountPath: /host-bin
      containers:
      - name: cainjekt
        image: cainjekt:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        env:
        - name: CAINJEKT_CA_FILE
          value: /etc/cainjekt/ca-bundle.pem
        - name: CAINJEKT_DYNAMIC_CA_ROOT
          value: /run/cainjekt/containers
        - name: CAINJEKT_PLUGIN_BINARY_PATH
          value: /opt/cainjekt/bin/cainjekt
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        args:
        - --name=cainjekt
        - --idx=10
        volumeMounts:
        - name: nri-socket
          mountPath: /var/run/nri
        - name: ca-bundle
          mountPath: /etc/cainjekt
          readOnly: true
        - name: dynamic-ca-root
          mountPath: /run/cainjekt
        - name: plugin-install-dir
          mountPath: /opt/cainjekt
          readOnly: true
        - name: host-root
          mountPath: /host
          readOnly: true
          mountPropagation: HostToContainer
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: nri-socket
        hostPath:
          path: /var/run/nri
          type: DirectoryOrCreate
      - name: ca-bundle
        configMap:
          name: cainjekt-ca-bundle
          optional: false
      - name: dynamic-ca-root
        hostPath:
          path: /run/cainjekt
          type: DirectoryOrCreate
      - name: plugin-install-dir
        hostPath:
          path: /opt/cainjekt
          type: DirectoryOrCreate
      - name: host-root
        hostPath:
          path: /
          type: Directory
