apiVersion: v1
kind: ServiceAccount
metadata:
  name: cainjekt
  namespace: kube-system
  labels:
    app: cainjekt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cainjekt
  labels:
    app: cainjekt
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cainjekt
  labels:
    app: cainjekt
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cainjekt
subjects:
- kind: ServiceAccount
  name: cainjekt
  namespace: kube-system
