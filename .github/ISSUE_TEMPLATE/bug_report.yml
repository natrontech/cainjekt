name: Bug Report
description: Report a bug in cainjekt
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: input
    id: version
    attributes:
      label: cainjekt version
      description: Output of the image tag or git commit you're running.
      placeholder: v0.1.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Deploy cainjekt with ...
        2. Create a pod with annotation ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include logs if possible.
    validations:
      required: true

  - type: input
    id: kubernetes
    attributes:
      label: Kubernetes version
      placeholder: v1.30.0

  - type: input
    id: containerd
    attributes:
      label: containerd version
      placeholder: v1.7.0

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
