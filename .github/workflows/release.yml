name: Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Extract metadata for installer
        id: meta-installer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-installer
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push installer image
        id: build-installer
        uses: docker/build-push-action@v5
        with:
          context: .
          target: installer
          push: true
          tags: ${{ steps.meta-installer.outputs.tags }}
          labels: ${{ steps.meta-installer.outputs.labels }}
          cache-from: type=gha
          platforms: linux/amd64,linux/arm64

      - name: Generate installer artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-installer
          subject-digest: ${{ steps.build-installer.outputs.digest }}
          push-to-registry: true

  release-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release manifests
        run: |
          cd deploy/kubernetes

          # Create a temporary kustomization with the release version
          cat > kustomization-release.yaml <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          namespace: kube-system

          resources:
          - rbac.yaml
          - daemonset.yaml

          images:
          - name: cainjekt
            newName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            newTag: ${{ steps.version.outputs.VERSION }}
          - name: cainjekt-installer
            newName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-installer
            newTag: ${{ steps.version.outputs.VERSION }}
          EOF

          # Generate the manifests
          kustomize build . -o ../../cainjekt-${{ steps.version.outputs.VERSION }}.yaml --load-restrictor LoadRestrictionsNone

          # Also generate with kustomization-release.yaml
          kustomize build . --load-restrictor LoadRestrictionsNone -o /dev/null
          mv kustomization-release.yaml kustomization.yaml
          kustomize build . -o ../../cainjekt-${{ steps.version.outputs.VERSION }}.yaml --load-restrictor LoadRestrictionsNone

          cd ../..

          # Create install instructions
          cat > INSTALL.txt <<EOF
          # cainjekt ${{ steps.version.outputs.VERSION }} Installation

          ## Prerequisites
          - Kubernetes cluster with containerd runtime
          - containerd v2.0+ (NRI enabled by default) or v1.x with NRI manually enabled

          ## Installation Steps

          1. Create ConfigMap with your CA bundle:

             kubectl create configmap cainjekt-ca-bundle \\
               --from-file=ca-bundle.pem=/path/to/your/ca-bundle.pem \\
               --namespace=kube-system

          2. Apply the manifests:

             kubectl apply -f cainjekt-${{ steps.version.outputs.VERSION }}.yaml

          3. Verify installation:

             kubectl get daemonset -n kube-system cainjekt
             kubectl get pods -n kube-system -l app=cainjekt

          ## Enable CA injection for a pod

          Add the annotation to your pod:

          apiVersion: v1
          kind: Pod
          metadata:
            name: my-app
            annotations:
              cainjekt.io/enabled: "true"
          spec:
            containers:
            - name: app
              image: my-app:latest

          For more information, see: https://github.com/${{ github.repository }}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cainjekt-${{ steps.version.outputs.VERSION }}.yaml
            INSTALL.txt
          body: |
            ## Container Images

            **Main image:**
            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}`
            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest`

            **Installer image (used by initContainer):**
            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-installer:${{ steps.version.outputs.VERSION }}`
            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-installer:latest`

            Both `linux/amd64` and `linux/arm64` platforms are supported.

            ## Installation

            ```bash
            # Pull the images
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-installer:${{ steps.version.outputs.VERSION }}

            # Create ConfigMap with your CA bundle
            kubectl create configmap cainjekt-ca-bundle \
              --from-file=ca-bundle.pem=/path/to/your/ca-bundle.pem \
              --namespace=kube-system

            # Deploy
            kubectl apply -f cainjekt-${{ steps.version.outputs.VERSION }}.yaml
            ```

            See `INSTALL.txt` for detailed installation instructions.
          generate_release_notes: true
