name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: |
          curl -fsSL -o ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.35.0

      - name: Verify toolchain
        run: |
          go version
          docker version
          kubectl version --client
          make --version | head -n 1

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: make integration-test

      - name: E2E tests
        run: make e2e-test

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: cainjekt:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm cainjekt:ci-test --help || true
          docker inspect cainjekt:ci-test --format='{{.Config.Entrypoint}}'
          docker inspect cainjekt:ci-test --format='Size: {{.Size}} bytes'
