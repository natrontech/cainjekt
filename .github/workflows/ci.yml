name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

      - name: Vet
        run: make vet

  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Helm lint
        run: helm lint charts/cainjekt

      - name: Helm template (default)
        run: helm template test charts/cainjekt --set caBundle="test-cert"

      - name: Helm template (full monitoring)
        run: |
          helm template test charts/cainjekt \
            --set caBundle="test-cert" \
            --set serviceMonitor.enabled=true \
            --set prometheusRule.enabled=true \
            --set grafanaDashboard.enabled=true \
            --set podDisruptionBudget.enabled=true

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          push: false
          tags: cainjekt:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build installer Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: installer
          load: true
          push: false
          tags: cainjekt-installer:ci-test
          cache-from: type=gha

      - name: Test Docker images
        run: |
          docker run --rm cainjekt:ci-test --help || true
          docker inspect cainjekt:ci-test --format='{{.Config.Entrypoint}}'
          docker inspect cainjekt:ci-test --format='Size: {{.Size}} bytes'
          docker inspect cainjekt-installer:ci-test --format='Size: {{.Size}} bytes'

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [lint-and-test, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: |
          curl -fsSL -o ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4
        with:
          version: v1.35.0

      - name: Create kind cluster
        run: make prepare-test-cluster

      - name: Build and load images
        run: make kind-load

      - name: Integration tests (TLS)
        run: make integration-test

      - name: E2E tests (kustomize + Helm + advanced)
        run: make e2e-test

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== DaemonSet status ==="
          kubectl get daemonset -n kube-system -o wide || true
          echo "=== Pods ==="
          kubectl get pods -n kube-system -l app.kubernetes.io/name=cainjekt -o wide || true
          kubectl get pods -n kube-system -l app=cainjekt -o wide || true
          echo "=== Pod logs ==="
          kubectl logs -n kube-system -l app.kubernetes.io/name=cainjekt --tail=100 --all-containers=true || true
          kubectl logs -n kube-system -l app=cainjekt --tail=100 --all-containers=true || true
          echo "=== Helm releases ==="
          helm list -n kube-system || true
          echo "=== Events ==="
          kubectl get events -n kube-system --sort-by=.metadata.creationTimestamp | tail -30 || true
