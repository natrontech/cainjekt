{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cainjekt.fullname" . }}-dashboard
  namespace: {{ .Values.grafanaDashboard.namespace | default (include "cainjekt.namespace" .) }}
  labels:
    {{- include "cainjekt.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  cainjekt.json: |-
    {
      "annotations": { "list": [] },
      "description": "CA certificate injection metrics for cainjekt",
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Injection Overview",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "title": "Injection Rate",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 10, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "errors" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "skipped" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] }
            ]
          },
          "targets": [
            { "expr": "sum(increase(cainjekt_injections_total[5m]))", "legendFormat": "injected" },
            { "expr": "sum(increase(cainjekt_injections_errors_total[5m]))", "legendFormat": "errors" },
            { "expr": "sum(increase(cainjekt_skipped_total[5m]))", "legendFormat": "skipped" }
          ]
        },
        {
          "title": "Success Rate",
          "type": "gauge",
          "gridPos": { "h": 10, "w": 3, "x": 10, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 90 }, { "color": "green", "value": 99 }] },
              "unit": "percent", "min": 0, "max": 100
            }
          },
          "targets": [
            { "expr": "100 * (1 - (sum(rate(cainjekt_injections_errors_total[5m])) / clamp_min(sum(rate(cainjekt_injections_total[5m])), 1)))" }
          ]
        },
        {
          "title": "Active",
          "type": "stat",
          "gridPos": { "h": 4, "w": 2, "x": 13, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "sum(cainjekt_active_containers)", "legendFormat": "active" }]
        },
        {
          "title": "Injected",
          "type": "stat",
          "gridPos": { "h": 4, "w": 2, "x": 15, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "round(sum(increase(cainjekt_injections_total[1h])))", "legendFormat": "last 1h" }]
        },
        {
          "title": "Errors",
          "type": "stat",
          "gridPos": { "h": 4, "w": 2, "x": 17, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "round(sum(increase(cainjekt_injections_errors_total[1h])))" }]
        },
        {
          "title": "Skipped",
          "type": "stat",
          "gridPos": { "h": 4, "w": 2, "x": 19, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "text", "value": null }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "round(sum(increase(cainjekt_skipped_total[1h])))" }]
        },
        {
          "title": "Orphans",
          "type": "stat",
          "gridPos": { "h": 4, "w": 3, "x": 21, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "text", "value": null }, { "color": "orange", "value": 10 }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "round(sum(increase(cainjekt_orphans_cleaned_total[1h])))" }]
        },
        {
          "title": "NRI Node Status",
          "description": "Shows which nodes have NRI available for CA injection.",
          "type": "table",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 11 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "align": "center" }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "node" }, "properties": [{ "id": "displayName", "value": "Node" }] },
              { "matcher": { "id": "byName", "options": "Value" }, "properties": [{ "id": "displayName", "value": "Status" }, { "id": "mappings", "value": [{ "options": { "0": { "text": "No NRI", "color": "red" }, "1": { "text": "NRI OK", "color": "green" } }, "type": "value" }] }, { "id": "custom.cellOptions", "value": { "type": "color-text" } }] },
              { "matcher": { "id": "byName", "options": "Time" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "__name__" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "instance" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "job" }, "properties": [{ "id": "custom.hidden", "value": true }] }
            ]
          },
          "options": { "showHeader": true, "footer": { "show": false } },
          "transformations": [{ "id": "reduce", "options": { "reducers": ["lastNotNull"] } }],
          "targets": [{ "expr": "cainjekt_nri_available", "legendFormat": "", "format": "table", "instant": true }]
        },
        {
          "title": "Pod Health",
          "description": "cainjekt pod restarts. High values indicate crashlooping pods (possibly nodes without NRI).",
          "type": "table",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 11 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "align": "center" }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "pod" }, "properties": [{ "id": "displayName", "value": "Pod" }] },
              { "matcher": { "id": "byName", "options": "Value" }, "properties": [{ "id": "displayName", "value": "Restarts" }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 3 }, { "color": "red", "value": 10 }] } }, { "id": "custom.cellOptions", "value": { "type": "color-text" } }] },
              { "matcher": { "id": "byName", "options": "Time" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "__name__" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "namespace" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "container" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "instance" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "job" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "uid" }, "properties": [{ "id": "custom.hidden", "value": true }] }
            ]
          },
          "options": { "showHeader": true, "sortBy": [{ "displayName": "Restarts", "desc": true }], "footer": { "show": false } },
          "targets": [{ "expr": "kube_pod_container_status_restarts_total{container=\"cainjekt\"}", "legendFormat": "", "format": "table", "instant": true }]
        },
        {
          "title": "CA Bundle",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "collapsed": false
        },
        {
          "title": "CA Bundle Age",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 2592000 }, { "color": "red", "value": 7776000 }] },
              "unit": "s"
            }
          },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "time() - max(cainjekt_ca_bundle_last_modified_timestamp)" }]
        },
        {
          "title": "Certificates",
          "type": "stat",
          "gridPos": { "h": 6, "w": 3, "x": 4, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "max(cainjekt_ca_bundle_certificates_count)" }]
        },
        {
          "title": "Injections by CA Hash (last 1h)",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 17, "x": 7, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" } } },
          "targets": [
            { "expr": "sum by (hash) (increase(cainjekt_ca_bundle_injections_total[1h]))", "legendFormat": "{{ `{{hash}}` }}" }
          ]
        },
        {
          "title": "Operations",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "collapsed": false
        },
        {
          "title": "Cleanups (last 1h)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" } } },
          "targets": [
            { "expr": "sum(increase(cainjekt_cleanups_total[1h]))", "legendFormat": "cleanups" },
            { "expr": "sum(increase(cainjekt_orphans_cleaned_total[1h]))", "legendFormat": "orphans" },
            { "expr": "sum(increase(cainjekt_cleanups_errors_total[1h]))", "legendFormat": "errors" }
          ]
        },
        {
          "title": "Go Runtime",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "bytes"
            }
          },
          "targets": [
            { "expr": "sum(go_memstats_alloc_bytes{job=~\".*cainjekt.*\"})", "legendFormat": "heap alloc" },
            { "expr": "sum(process_resident_memory_bytes{job=~\".*cainjekt.*\"})", "legendFormat": "RSS" }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["cainjekt", "kubernetes", "certificates"],
      "templating": {
        "list": [
          {
            "current": { "text": "Prometheus", "value": "prometheus" },
            "includeAll": false,
            "label": "Datasource",
            "name": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "title": "cainjekt",
      "uid": "cainjekt-overview"
    }
{{- end }}
