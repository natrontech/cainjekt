{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cainjekt.fullname" . }}-dashboard
  namespace: {{ .Values.grafanaDashboard.namespace | default (include "cainjekt.namespace" .) }}
  labels:
    {{- include "cainjekt.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  cainjekt.json: |-
    {
      "annotations": { "list": [] },
      "description": "CA certificate injection metrics for cainjekt",
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Injection Overview",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "title": "NRI Status",
          "description": "Nodes where NRI is available (1) vs unavailable (0). Nodes without NRI cannot inject CAs.",
          "type": "stat",
          "gridPos": { "h": 4, "w": 3, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "mappings": [{ "options": { "0": { "text": "No NRI" }, "1": { "text": "NRI OK" } }, "type": "value" }]
            }
          },
          "options": { "graphMode": "none", "textMode": "value_and_name" },
          "targets": [{ "expr": "cainjekt_nri_available", "legendFormat": "{{ `{{instance}}` }}" }]
        },
        {
          "title": "Injections / min",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 3, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "errors" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          },
          "targets": [
            { "expr": "sum(rate(cainjekt_injections_total[5m]))", "legendFormat": "total" },
            { "expr": "sum(rate(cainjekt_injections_errors_total[5m]))", "legendFormat": "errors" },
            { "expr": "sum(rate(cainjekt_skipped_total[5m]))", "legendFormat": "skipped" }
          ]
        },
        {
          "title": "Success Rate",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 3, "x": 10, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 90 }, { "color": "green", "value": 99 }] },
              "unit": "percent", "min": 0, "max": 100
            }
          },
          "targets": [
            { "expr": "100 * (1 - (sum(rate(cainjekt_injections_errors_total[5m])) / clamp_min(sum(rate(cainjekt_injections_total[5m])), 1)))" }
          ]
        },
        {
          "title": "Active",
          "type": "stat",
          "gridPos": { "h": 4, "w": 2, "x": 13, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "sum(cainjekt_active_containers)", "legendFormat": "active" }]
        },
        {
          "title": "Injections",
          "type": "stat",
          "gridPos": { "h": 4, "w": 2, "x": 15, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "sum(cainjekt_injections_total)" }]
        },
        {
          "title": "Errors",
          "type": "stat",
          "gridPos": { "h": 4, "w": 2, "x": 17, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "sum(cainjekt_injections_errors_total)" }]
        },
        {
          "title": "Skipped",
          "type": "stat",
          "gridPos": { "h": 4, "w": 2, "x": 19, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "text", "value": null }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "sum(cainjekt_skipped_total)" }]
        },
        {
          "title": "Orphans",
          "type": "stat",
          "gridPos": { "h": 4, "w": 3, "x": 21, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "text", "value": null }, { "color": "orange", "value": 10 }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "sum(cainjekt_orphans_cleaned_total)" }]
        },
        {
          "title": "Injections Over Time",
          "type": "timeseries",
          "gridPos": { "h": 4, "w": 11, "x": 13, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 1, "showPoints": "never" }
            }
          },
          "targets": [
            { "expr": "sum(cainjekt_injections_total)", "legendFormat": "injections" },
            { "expr": "sum(cainjekt_skipped_total)", "legendFormat": "skipped" }
          ]
        },
        {
          "title": "CA Bundle",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "collapsed": false
        },
        {
          "title": "CA Bundle Age",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 2592000 }, { "color": "red", "value": 7776000 }] },
              "unit": "s"
            }
          },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "time() - max(cainjekt_ca_bundle_last_modified_timestamp)" }]
        },
        {
          "title": "Certificates in Bundle",
          "type": "stat",
          "gridPos": { "h": 6, "w": 3, "x": 4, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } },
          "options": { "graphMode": "none" },
          "targets": [{ "expr": "max(cainjekt_ca_bundle_certificates_count)" }]
        },
        {
          "title": "Injections by CA Hash",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 17, "x": 7, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" } } },
          "targets": [
            { "expr": "sum by (hash) (rate(cainjekt_ca_bundle_injections_total[5m]))", "legendFormat": "{{ `{{hash}}` }}" }
          ]
        },
        {
          "title": "Operations",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "collapsed": false
        },
        {
          "title": "Cleanups / min",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" } } },
          "targets": [
            { "expr": "sum(rate(cainjekt_cleanups_total[5m]))", "legendFormat": "cleanups" },
            { "expr": "sum(rate(cainjekt_orphans_cleaned_total[5m]))", "legendFormat": "orphans" },
            { "expr": "sum(rate(cainjekt_cleanups_errors_total[5m]))", "legendFormat": "errors" }
          ]
        },
        {
          "title": "Go Runtime",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "bytes"
            }
          },
          "targets": [
            { "expr": "sum(go_memstats_alloc_bytes{job=~\".*cainjekt.*\"})", "legendFormat": "heap alloc" },
            { "expr": "sum(process_resident_memory_bytes{job=~\".*cainjekt.*\"})", "legendFormat": "RSS" }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["cainjekt", "kubernetes", "certificates"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "cainjekt",
      "uid": "cainjekt-overview"
    }
{{- end }}
