{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cainjekt.fullname" . }}
  labels:
    {{- include "cainjekt.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cainjekt.fullname" . }}
  labels:
    {{- include "cainjekt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cainjekt.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cainjekt.serviceAccountName" . }}
    namespace: {{ include "cainjekt.namespace" . }}
{{- end }}
